spring.application.name=sprinklr-marketplace
# Spring WebFlux Server Port
server.port=8080

# MongoDB Connection
spring.mongodb.uri=mongodb://localhost:27017/sprinklr_marketplace

# Outlook SMTP — set MAIL_USERNAME and MAIL_PASSWORD env vars (use an Outlook app password, not your login password)
spring.mail.host=smtp-mail.outlook.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp-mail.outlook.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2 TLSv1.3

# When true, logs OTP to server console if SMTP fails (dev only — set false in production)
app.mail.console-otp-fallback=${MAIL_CONSOLE_OTP_FALLBACK:true}

# JWT
app.jwt.secret=${JWT_SECRET:w42vQZYrgqGqmsoODPp6KaJ+yQmCWc6PiCm8GY6wbnY=}
app.jwt.expiration-ms=86400000

