spring.application.name=sprinklr-marketplace
# Spring WebFlux Server Port
server.port=8080

# MongoDB Connection
spring.mongodb.uri=mongodb://localhost:27017/sprinklr_marketplace

# Microsoft OAuth2 (Azure AD / Entra ID v2.0)
# For Sprinklr work accounts: set MICROSOFT_TENANT_ID to your Sprinklr Directory (tenant) ID
# instead of "common". Ask your Azure admin to grant admin consent for the app.
app.oauth2.microsoft.tenant-id=${MICROSOFT_TENANT_ID:common}

spring.security.oauth2.client.registration.microsoft.client-id=${MICROSOFT_CLIENT_ID:492551d4-ff73-439d-9eb6-1ff541faa8ac}
spring.security.oauth2.client.registration.microsoft.client-secret=${MICROSOFT_CLIENT_SECRET:your-microsoft-client-secret}
spring.security.oauth2.client.registration.microsoft.scope=openid,profile,email
spring.security.oauth2.client.registration.microsoft.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.microsoft.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.microsoft.authorization-uri=https://login.microsoftonline.com/${app.oauth2.microsoft.tenant-id}/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.microsoft.token-uri=https://login.microsoftonline.com/${app.oauth2.microsoft.tenant-id}/oauth2/v2.0/token
spring.security.oauth2.client.provider.microsoft.user-info-uri=https://graph.microsoft.com/oidc/userinfo
spring.security.oauth2.client.provider.microsoft.user-name-attribute=sub
spring.security.oauth2.client.provider.microsoft.jwk-set-uri=https://login.microsoftonline.com/${app.oauth2.microsoft.tenant-id}/discovery/v2.0/keys

# JWT
app.jwt.secret=${JWT_SECRET:qoES36gXJAJl1s10eI9OoevTltDBe0kIJOB4W9nNC9Y=}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
