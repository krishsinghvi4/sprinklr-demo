spring.application.name=sprinklr-marketplace
# Spring WebFlux Server Port
server.port=8080

# MongoDB Connection
spring.mongodb.uri=mongodb://localhost:27017/sprinklr_marketplace

# Mail provider: auto | smtp | graph
# - auto: use Microsoft Graph if Azure credentials are set, otherwise SMTP
# - graph: required for Outlook/O365 (basic SMTP auth is disabled by Microsoft)
# - smtp: use Gmail or another provider that still supports app-password SMTP
app.mail.provider=${MAIL_PROVIDER:auto}

# SMTP (works with Gmail app passwords; Outlook personal accounts no longer support basic auth)
spring.mail.host=${MAIL_HOST:smtp-mail.outlook.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp-mail.outlook.com}
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2 TLSv1.3

# Microsoft Graph API (for Outlook/O365 — register an app in Azure Entra ID)
# Grant API permission: Office 365 Exchange Online -> SMTP.SendAsApp (application) or Mail.Send
# Admin consent required. Set MAIL_PROVIDER=graph when using this.
app.mail.graph.tenant-id=${AZURE_TENANT_ID:}
app.mail.graph.client-id=${AZURE_CLIENT_ID:}
app.mail.graph.client-secret=${AZURE_CLIENT_SECRET:}

# When true, logs OTP to server console if mail delivery fails (dev only)
app.mail.console-otp-fallback=${MAIL_CONSOLE_OTP_FALLBACK:true}

# JWT
app.jwt.secret=${JWT_SECRET:w42vQZYrgqGqmsoODPp6KaJ+yQmCWc6PiCm8GY6wbnY=}
app.jwt.expiration-ms=86400000
