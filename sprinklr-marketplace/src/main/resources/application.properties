spring.application.name=sprinklr-marketplace
# Spring WebFlux Server Port
server.port=8080

# MongoDB Connection
spring.mongodb.uri=mongodb://localhost:27017/sprinklr_marketplace

# Mail provider: smtp (default, Gmail) | graph (Outlook/O365 via Azure)
app.mail.provider=${MAIL_PROVIDER:smtp}

# Gmail SMTP (default sender)
# Requires a Google App Password: https://myaccount.google.com/apppasswords (2FA must be enabled)
# Set via environment variables when starting the server:
#   export MAIL_USERNAME=your@gmail.com
#   export MAIL_PASSWORD=your-16-char-app-password
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2 TLSv1.3

# Microsoft Graph API (optional — only if MAIL_PROVIDER=graph)
app.mail.graph.tenant-id=${AZURE_TENANT_ID:}
app.mail.graph.client-id=${AZURE_CLIENT_ID:}
app.mail.graph.client-secret=${AZURE_CLIENT_SECRET:}

# When true, logs OTP to server console if mail delivery fails (dev only)
app.mail.console-otp-fallback=${MAIL_CONSOLE_OTP_FALLBACK:true}

# JWT
app.jwt.secret=${JWT_SECRET:w42vQZYrgqGqmsoODPp6KaJ+yQmCWc6PiCm8GY6wbnY=}
app.jwt.expiration-ms=86400000
