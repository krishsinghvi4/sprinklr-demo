spring.application.name=sprinklr-marketplace
# Spring WebFlux Server Port
server.port=8080

# MongoDB Connection
spring.mongodb.uri=mongodb://localhost:27017/sprinklr_marketplace

# Mail provider: smtp (default, Gmail) | graph (Outlook/O365 via Azure)
app.mail.provider=${MAIL_PROVIDER:smtp}

# Gmail SMTP (default sender)
# Requires a Google App Password: https://myaccount.google.com/apppasswords (2FA must be enabled)
# Set via environment variables when starting the server:
#   export MAIL_USERNAME=your@gmail.com
#   export MAIL_PASSWORD=your-16-char-app-password
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2 TLSv1.3

# Microsoft Graph API (optional — only if MAIL_PROVIDER=graph)
app.mail.graph.tenant-id=${AZURE_TENANT_ID:}
app.mail.graph.client-id=${AZURE_CLIENT_ID:}
app.mail.graph.client-secret=${AZURE_CLIENT_SECRET:}

# When true, logs OTP to server console if mail delivery fails (dev only)
app.mail.console-otp-fallback=${MAIL_CONSOLE_OTP_FALLBACK:true}

# JWT (set JWT_SECRET in production; dev default below is for local startup only)
app.jwt.secret=${JWT_SECRET:dev-sprinklr-marketplace-jwt-hmac-secret-key-min-256-bits}
app.jwt.expiration-ms=86400000

# LLM Router (Sprinklr IntuitionX)
# Set LLM_STUB=false and LLM_ROUTER_COOKIE when calling the real router in non-local environments.
app.llm.stub-enabled=${LLM_STUB:true}
app.llm.base-url=${LLM_BASE_URL:http://prod0-intuitionx-llm-router-v2.sprinklr.com}
app.llm.completion-path=/chat-completion
app.llm.cookie=${LLM_ROUTER_COOKIE:}
app.llm.model=gpt-4.1-2025-04-14
app.llm.client-identifier=ml-cfm-dev
app.llm.partner-id=9004
app.llm.provider=AZURE_OPEN_AI
app.llm.temperature=0.1
app.llm.max-completion-tokens=30000
app.llm.tracking-params.feature=BOT_DYNAMIC_CONVERSATION_ROUTER_ENGINE_METADATA_SPRINKLR_COPILOT_ADS_MANAGER
app.llm.connect-timeout-ms=${LLM_CONNECT_TIMEOUT_MS:30000}
app.llm.read-timeout-ms=${LLM_READ_TIMEOUT_MS:100000}
app.llm.system-prompt-path=classpath:llm/system-prompt.txt
app.llm.tool-router-prompt-path=${LLM_TOOL_ROUTER_PROMPT_PATH:classpath:llm/tool-router-prompt.txt}
app.llm.tool-dependency-graph-prompt-path=${LLM_TOOL_DEP_GRAPH_PROMPT_PATH:classpath:llm/tool-dependency-graph-prompt.txt}
app.llm.pricing.prompt-cost-per-1k-usd=${LLM_PROMPT_COST_PER_1K_USD:0.002}
app.llm.pricing.completion-cost-per-1k-usd=${LLM_COMPLETION_COST_PER_1K_USD:0.008}

# Resilience4j circuit breaker for LLM router HTTP calls
resilience4j.circuitbreaker.instances.llmRouter.sliding-window-size=10
resilience4j.circuitbreaker.instances.llmRouter.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.llmRouter.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.llmRouter.permitted-number-of-calls-in-half-open-state=3

# Chat history context (LLM turns, not raw message rows)
app.chat.history-turn-limit=${CHAT_HISTORY_TURN_LIMIT:10}

# MCP Marketplace
app.mcp.connect-timeout-ms=${MCP_CONNECT_TIMEOUT_MS:10000}
app.mcp.read-timeout-ms=${MCP_READ_TIMEOUT_MS:30000}
app.mcp.max-response-bytes=${MCP_MAX_RESPONSE_BYTES:5242880}
app.mcp.max-agentic-iterations=${MCP_MAX_AGENTIC_ITERATIONS:10}
app.mcp.max-tool-calls-per-turn=${MCP_MAX_TOOL_CALLS_PER_TURN:15}
app.mcp.encryption-key=${MCP_ENCRYPTION_KEY:}
app.mcp.catalog-path=classpath:mcp/mcp-catalog.json
app.mcp.oauth-redirect-uri=${MCP_OAUTH_REDIRECT_URI:http://localhost:5173/oauth/callback}
app.mcp.oauth-state-ttl-seconds=${MCP_OAUTH_STATE_TTL_SECONDS:600}
app.mcp.oauth-success-redirect-url=${MCP_OAUTH_SUCCESS_REDIRECT_URL:http://localhost:5173/profile?oauth=success}
app.mcp.oauth-error-redirect-url=${MCP_OAUTH_ERROR_REDIRECT_URL:http://localhost:5173/profile?oauth=error}

# Progressive tool context: lightweight router + LLM-generated dependency-graph expansion.
# enabled=false restores legacy behavior (every active tool sent to the LLM each turn).
app.mcp.tool-selection.enabled=${MCP_TOOL_SELECTION_ENABLED:true}
app.mcp.tool-selection.max-tools=${MCP_TOOL_SELECTION_MAX_TOOLS:15}
app.mcp.tool-selection.router-max-primary-tools=${MCP_TOOL_SELECTION_ROUTER_MAX_PRIMARY:8}
app.mcp.tool-selection.router-history-turns=${MCP_TOOL_SELECTION_ROUTER_HISTORY_TURNS:2}
app.mcp.tool-selection.generate-graph-on-connect=${MCP_TOOL_SELECTION_GENERATE_GRAPH:true}
# Opt-in hard ordering gate (safety net). Leave off unless you want strict prerequisite enforcement.
app.mcp.tool-selection.dependency-preflight-enabled=${MCP_TOOL_SELECTION_PREFLIGHT:true}
app.mcp.tool-selection.continuation-ttl-hours=${MCP_TOOL_SELECTION_CONTINUATION_TTL_HOURS:24}

# Resilience4j shared config for per-connection MCP circuit breakers (see McpCircuitBreakerFactory)
resilience4j.circuitbreaker.configs.mcpDefault.sliding-window-size=10
resilience4j.circuitbreaker.configs.mcpDefault.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.mcpDefault.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.configs.mcpDefault.permitted-number-of-calls-in-half-open-state=3
